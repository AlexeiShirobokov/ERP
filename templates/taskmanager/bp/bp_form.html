{% extends 'base.html' %}
{% block title %}Новый процесс{% endblock %}

{% block content %}
<h2 class="text-center fw-semibold mb-4">Новый бизнес-процесс</h2>

<div class="card clean">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Название *</label>
        <input type="text" name="title" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Описание</label>
        <textarea name="description" class="form-control" rows="4"></textarea>
      </div>

      <div class="row g-3">
        <div class="col-lg-6">
          <label class="form-label">Срок</label>
          <input type="datetime-local" name="deadline" class="form-control">
        </div>
        <div class="col-lg-6">
          <label class="form-label">Шаблон</label>
          <select name="template" class="form-select">
            <option value="purchase" selected>Покупка</option>
          </select>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <a href="{% url 'project_list' %}" class="btn btn-secondary">Отмена</a>
        <button type="submit" class="btn btn-primary">Создать процесс</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
