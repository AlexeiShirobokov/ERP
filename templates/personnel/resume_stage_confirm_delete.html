{% extends "personnel/base.html" %}

{% block title %}Удалить этап{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body">
        <h1 class="h3 mb-3">Удалить этап</h1>
        <p class="mb-4">
            Вы действительно хотите удалить этап <strong>{{ object.name }}</strong>?
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a href="{% url 'personnel:resume_stage_list' %}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
