<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Персонал{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
        .table th { white-space: nowrap; }
        .card { border-radius: 14px; }
        .field-label { color: #6c757d; font-size: 0.9rem; margin-bottom: 0.25rem; }
        .field-value { font-weight: 500; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'personnel:record_list' %}">Персонал</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#personnelNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="personnelNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'index' %}">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'personnel:record_list' %}">Реестр</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'personnel:resume_candidate_kanban' %}">Канбан</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'personnel:record_create' %}">Новая карточка</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="{% block container_class %}container{% endblock %} pb-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const addBtn = document.getElementById('add-document-row');
    const rowsContainer = document.getElementById('document-rows');
    const template = document.getElementById('document-row-template');

    if (addBtn && rowsContainer && template) {
        addBtn.addEventListener('click', function () {
            const clone = template.content.cloneNode(true);
            rowsContainer.appendChild(clone);
        });

        rowsContainer.addEventListener('click', function (event) {
            if (event.target.classList.contains('remove-document-row')) {
                const rows = rowsContainer.querySelectorAll('.document-row');
                if (rows.length > 1) {
                    event.target.closest('.document-row').remove();
                }
            }
        });
    }
});
</script>
</body>
</html>
