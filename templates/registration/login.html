<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 360px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
        }

        .row {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
        }

        .errorlist {
            color: #b00020;
            margin-bottom: 12px;
            list-style: none;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Вход в систему</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <div class="row">
                <label for="{{ form.username.id_for_label }}">Логин</label>
                {{ form.username }}
            </div>

            <div class="row">
                <label for="{{ form.password.id_for_label }}">Пароль</label>
                {{ form.password }}
            </div>

            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
